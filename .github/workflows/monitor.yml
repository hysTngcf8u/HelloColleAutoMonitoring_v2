name: HelloColle V2 Monitor

on:
  schedule:
    - cron: '13,28,43,58 * * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 20から24へ変更
          cache: 'npm'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # この行を追加
      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        # --with-deps を外して軽量化
        run: npx playwright install chromium 

      - name: Execute Monitor
        # 10分以上かかったら強制終了させる設定を追加
        timeout-minutes: 10 
        run: npx playwright test
        env:
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          # LINE通知も継続したい場合はここに追加
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}